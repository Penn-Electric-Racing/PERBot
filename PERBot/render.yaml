services:
  - type: worker
    name: perbot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:cloud
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RESPONSE_MODEL
        value: gpt-5
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: Penn-Electric-Racing/PERBot
      - key: INDEX_PATH
        value: ./data/notion-index.json
      - key: INDEX_STATUS_PATH
        value: ./data/index-status.json
      - key: CURRENT_REV
        value: REV11
      - key: TOP_K_RESULTS
        value: 3
