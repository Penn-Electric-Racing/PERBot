services:
  - type: worker
    name: perbot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:cloud
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RESPONSE_MODEL
        value: gpt-5
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CURRENT_REV
        value: REV11
      - key: TOP_K_RESULTS
        value: 3
      - key: ALWAYS_REINDEX_ON_START
        value: "true"
