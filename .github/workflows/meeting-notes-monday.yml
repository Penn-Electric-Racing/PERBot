name: Meeting Notes — Monday Kickoff

# GitHub Actions cron is unreliable (delays up to several hours during peak load).
# We fire many times across 8am-12pm ET and use idempotency in the script to
# ensure kickoffs are posted exactly once per channel per Monday.
on:
  schedule:
    - cron: '0 12 * * 1'    # 8am EDT / 7am EST UTC
    - cron: '30 12 * * 1'
    - cron: '0 13 * * 1'    # 9am EDT / 8am EST UTC
    - cron: '30 13 * * 1'
    - cron: '0 14 * * 1'    # 10am EDT / 9am EST UTC
    - cron: '30 14 * * 1'
    - cron: '0 15 * * 1'    # 11am EDT / 10am EST UTC
    - cron: '30 15 * * 1'
    - cron: '0 16 * * 1'    # 12pm EDT / 11am EST UTC
    - cron: '30 16 * * 1'
    - cron: '0 17 * * 1'    # 1pm EDT / 12pm EST UTC
  workflow_dispatch:

jobs:
  post-kickoff:
    runs-on: ubuntu-latest
    # Ensure two runs can't overlap and race each other
    concurrency:
      group: monday-kickoff
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: PERBot/package-lock.json

      - name: Install dependencies
        working-directory: PERBot
        run: npm ci

      - name: Post kickoff messages
        working-directory: PERBot
        run: npx tsx src/meetingNotes/postKickoff.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
